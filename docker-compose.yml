# Docker Compose 编排 — 鲜标智投 · 生鲜食材配送投标文件智能生成平台
# 一键启动：docker compose up -d
name: fresh-bid-platform

services:
  # --- PostgreSQL 16 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fresh-bid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fresh_bid_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # ports:
    #   - "127.0.0.1:5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # --- Redis Stack ---
  redis:
    image: redis/redis-stack-server:latest
    container_name: fresh-bid-redis
    restart: unless-stopped
    # ports:
    #   - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data

  # --- 后端 API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fresh-bid-api
    restart: unless-stopped
    env_file: ./backend/.env
    # 容器内覆盖：数据库/Redis 使用服务名而非 localhost
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/fresh_bid_platform"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["http://localhost","http://localhost:3000","http://localhost:80"]'
    expose:
      - "8000"
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # --- 前端 ---
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 构建时注入：浏览器端 API 通过 Nginx 反代（相对路径）
        NEXT_PUBLIC_API_URL: "/api/v1"
    container_name: fresh-bid-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "/api/v1"
    expose:
      - "3000"
    depends_on:
      - api

  # --- Nginx 反代网关 ---
  nginx:
    image: nginx:alpine
    container_name: fresh-bid-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  pg_data:
  redis_data:
  api_storage:
