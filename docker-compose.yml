# Docker Compose 编排 — 鲜标智投 · 生鲜食材配送投标文件智能生成平台
# 一键启动：docker compose up -d
name: fresh-bid-platform

services:
  # --- PostgreSQL 16 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fresh-bid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fresh_bid_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- Redis Stack ---
  redis:
    image: redis/redis-stack-server:latest
    container_name: fresh-bid-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6390:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- 后端 API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fresh-bid-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/fresh_bid_platform"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["http://localhost","http://localhost:3000","http://localhost:8890"]'
      WORKERS: "${API_WORKERS:-2}"
      # LLM 外网请求走宿主机代理网络
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
    dns:
      - 192.168.10.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- 前端 ---
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 构建时注入：浏览器端 API 通过 Nginx 反代（相对路径）
        NEXT_PUBLIC_API_URL: "/api/v1"
    container_name: fresh-bid-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "/api/v1"
    expose:
      - "3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Nginx 反代网关 ---
  nginx:
    image: nginx:alpine
    container_name: fresh-bid-nginx
    restart: unless-stopped
    ports:
      - "8890:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://api:8000/api/v1/health || exit 1"]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  pg_data:
  redis_data:
  api_storage:
