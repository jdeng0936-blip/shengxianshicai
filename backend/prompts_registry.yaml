# ═══════════════════════════════════════════════════════
# 投标文件生成核心 Prompt 注册表 — 鲜标智投
# 支持多版本迭代 / A/B 测试
# ═══════════════════════════════════════════════════════

prompts:

  # ===== 投标章节生成 =====
  bid_generation:
    v1_standard:
      version: "1.0"
      description: "标准投标章节生成 — 基于招标要求+企业信息+RAG知识库"
      template: |
        请编写生鲜食材配送投标文件的【{chapter_no} {title}】章节完整正文。

        == 招标项目信息 ==
        采购方：{buyer_name}（{customer_type}）
        项目名称：{project_name}
        预算金额：{budget}元
        配送范围：{delivery_scope}

        == 投标企业信息 ==
        {enterprise_info}

        == 本章节对应评分标准（必须逐条覆盖）==
        {scoring_criteria}

        == 章节大纲框架（必须全部保留并充分展开）==
        {outline}

        == 知识库参考（食品安全法规/冷链标准/行业模板）==
        {rag_context}

        == 历史中标方案参考 ==
        {similar_cases}

        要求：
        1. 语言专业正式，符合政府采购投标文件规范
        2. 每项技术指标必须有具体数值（禁止写"按规定""视情况""根据实际"）
        3. 食品安全措施必须覆盖：留样制度(≥72h)/全程追溯/农残检测/健康证管理
        4. 冷链参数必须符合 GB/T 22918 标准（冷藏0-4℃/冷冻≤-18℃）
        5. 配送承诺必须量化：准时率/破损率/满意率/响应时间
        6. 体现投标企业独特优势和差异化竞争力
        7. 引用法规条款时标注来源（如《食品安全法》第XX条）

        直接输出排版优美的投标文件正文段落，不输出任何自我介绍或致谢。

    v2_with_images:
      version: "2.0"
      description: "V2增强版 — 支持图片引用标记和表格生成"
      template: |
        请编写生鲜食材配送投标文件的【{chapter_no} {title}】章节完整正文。

        == 招标项目信息 ==
        {project_info}

        == 投标企业信息 ==
        {enterprise_info}

        == 评分标准 ==
        {scoring_criteria}

        == 章节大纲 ==
        {outline}

        == 知识库参考 ==
        {rag_context}

        == 可用图片资源（在正文适当位置插入引用标记）==
        {available_images}

        要求：
        1. 所有技术规范同V1要求
        2. 在需要插入图片的位置使用标记格式：[[IMG:图片ID:图片说明文字]]
        3. 在需要表格的位置使用标记格式：[[TABLE:表格标题]]后跟Markdown表格
        4. 插图建议位置：冷链车辆、仓库温区、检测设备、配送流程图、组织架构图

        直接输出投标文件正文。

    # ===== V3: 评分权重驱动 + 专项深化 =====
    v3_scoring_driven:
      version: "3.0"
      description: "V3评分驱动版 — 高分章节自动多轮优化+7大专项深化"
      template: |
        你是顶级投标文件撰写专家。请编写【{chapter_no} {title}】的完整正文。

        ⚠️ 本章节在评分体系中占比 {score_weight}%（满分 {max_score} 分），属于{priority_level}章节。

        == 评分标准（必须逐条响应，每条单独成段）==
        {scoring_criteria}

        == 招标项目 ==
        {project_info}

        == 企业信息 ==
        {enterprise_info}

        == 知识库参考 ==
        {rag_context}

        == 专项要求 ==
        {domain_requirements}

        📋 写作策略（根据分值调整深度）：
        - 高分章节（≥15分）：每个评分点展开 300+ 字，配表格/流程图标记
        - 中分章节（8-14分）：每个评分点展开 150-300 字
        - 低分章节（<8分）：简洁精准，每个评分点 80-150 字

        📐 格式规范：
        1. 每个评分点用「一、」「二、」大编号，子项用「（一）」「1.」
        2. 关键数值加粗：**5辆冷链车**、**0-4℃**、**99.5%准时率**
        3. 法规引用标注来源
        4. 在合适位置插入 [[TABLE:xxx]] 或 [[IMG:xxx:说明]]

        直接输出正文，不加任何解释。

  # ===== 7大专项 Prompt =====
  domain_prompts:
    cold_chain:
      version: "1.0"
      description: "冷链物流专项要求"
      template: |
        冷链配送专项要求：
        - 冷藏车温度必须维持 0-4℃，冷冻车 ≤-18℃
        - 配备 GPS+温度记录仪，数据保留≥2年
        - 交接时双方签字确认温度读数
        - 运输时间 ≤2h（常规）/ ≤30min（应急）
        - 车辆每日清洁消毒，消毒记录可追溯
        - 符合 GB/T 28843-2012 追溯管理要求

    food_safety:
      version: "1.0"
      description: "食品安全专项要求"
      template: |
        食品安全专项要求：
        - 食品留样制度：每餐每品≥125g，冷藏48h以上
        - 农残快检：每日送货批次100%快检，合格方可入库
        - 进货查验：查验供货者许可证+检验合格证，记录保存≥6个月
        - 从业人员健康证管理：100%持证上岗，每年复检
        - 食品安全事故2小时内上报，启动应急预案
        - 符合《食品安全法》第33/34/53/54条

    quality_control:
      version: "1.0"
      description: "质量管控专项要求"
      template: |
        质量管控专项要求：
        - 建立HACCP/ISO22000质量管理体系
        - 供应商准入审核制度（资质/产地/检测报告三审）
        - 三级质检：采购入库检→分拣加工检→配送出库检
        - 不合格品处理：隔离→记录→退货→追溯→整改
        - 质量指标：合格率≥99%，客诉处理≤24h

    delivery:
      version: "1.0"
      description: "配送服务专项要求"
      template: |
        配送服务专项要求：
        - 配送准时率承诺≥99%，迟到赔偿机制
        - 多温区配送（冷藏+冷冻+常温分仓分车）
        - 节假日/恶劣天气应急配送预案
        - 配送路线优化（GPS+智能调度系统）
        - 签收验收流程：数量→品质→温度→单据

    personnel:
      version: "1.0"
      description: "人员配置专项要求"
      template: |
        人员配置专项要求：
        - 项目经理：≥5年食材配送管理经验
        - 质检员：食品检验相关资质，每批次签字
        - 配送员：健康证+食品安全培训合格证
        - 营养师（学校项目）：注册营养师资质
        - 培训制度：入职培训+月度考核+年度复训

    emergency:
      version: "1.0"
      description: "应急保障专项要求"
      template: |
        应急保障专项要求：
        - 食品安全事故应急预案（2h响应→4h处置→24h报告）
        - 断供应急方案：备用供应商名单（≥3家/品类）
        - 自然灾害/疫情配送保障方案
        - 设备故障应急（备用冷链车≥2辆随时待命）
        - 投诉处理：30min响应→2h到场→24h解决

    quotation:
      version: "1.0"
      description: "报价策略专项要求"
      template: |
        报价编制专项要求：
        - 报价必须覆盖全部品类，不得遗漏
        - 单价精确到分（小数点后2位）
        - 下浮率在合理区间（通常5%-15%）
        - 分品类报价明细表+汇总表
        - 价格调整机制（市场波动超10%时的调价公式）

  # ===== 招标文件解析 =====
  tender_parse:
    v1_structured:
      version: "1.0"
      description: "招标文件结构化解析 — 提取资格要求/评分标准/废标项"
      template: |
        你是专业的招标文件分析师，请仔细阅读以下招标文件内容，
        提取并结构化输出关键信息。

        == 招标文件原文 ==
        {tender_content}

        请严格按照以下 JSON 格式输出：
        {{
          "project_name": "项目名称",
          "buyer_name": "采购方名称",
          "customer_type": "school/hospital/government/enterprise",
          "budget_amount": 数字（元）,
          "deadline": "YYYY-MM-DD HH:MM",
          "tender_type": "open/invite/negotiate",
          "delivery_scope": "配送范围描述",

          "disqualification_items": [
            {{"content": "废标条件1", "severity": "fatal"}},
            ...
          ],

          "qualification_requirements": [
            {{"content": "资格要求1", "is_mandatory": true}},
            ...
          ],

          "technical_requirements": [
            {{"content": "技术要求1", "category": "cold_chain/food_safety/delivery/quality"}},
            ...
          ],

          "scoring_criteria": [
            {{"item": "评分项名称", "max_score": 分数, "weight": 百分比, "description": "评分说明"}},
            ...
          ],

          "commercial_requirements": [
            {{"content": "商务要求1"}},
            ...
          ],

          "quotation_format": {{
            "discount_rate_required": true/false,
            "categories": ["蔬菜", "肉类", ...],
            "pricing_method": "固定单价/下浮率/综合评标价"
          }}
        }}

        注意：
        1. 废标项是最关键的信息，必须逐条提取，不能遗漏任何一条
        2. 如果招标文件中未明确某项，值填写 null
        3. severity 只有 "fatal"（废标）和 "warning"（扣分）两种

    v2_scoring_matrix:
      version: "2.0"
      description: "招标文件结构化解析 V2 — 评分矩阵精细化 + 子项拆解"
      template: |
        你是专业的招标文件分析师，请仔细阅读以下招标文件内容，
        重点提取评分标准矩阵并精细化拆解为可验证的子项。

        == 招标文件原文 ==
        {tender_content}

        请严格按照以下 JSON 格式输出：
        {{
          "project_name": "项目名称",
          "buyer_name": "采购方名称",
          "customer_type": "school/hospital/government/enterprise",
          "budget_amount": 数字（元）,
          "deadline": "YYYY-MM-DD HH:MM",
          "tender_type": "open/invite/negotiate",
          "delivery_scope": "配送范围描述",

          "disqualification_items": [
            {{"content": "废标条件描述", "severity": "fatal", "keywords": ["关键词1", "关键词2"]}}
          ],

          "qualification_requirements": [
            {{"content": "资格要求描述", "is_mandatory": true, "keywords": ["关键词1"]}}
          ],

          "technical_requirements": [
            {{"content": "技术要求描述", "category": "cold_chain/food_safety/delivery/quality"}}
          ],

          "scoring_criteria": [
            {{
              "dimension": "评分维度名称（如技术方案）",
              "max_score": 总分,
              "sub_items": [
                {{
                  "name": "子项名称（如冷链运输方案）",
                  "max_score": 子项分数,
                  "weight": 百分比,
                  "description": "评分说明",
                  "keywords": ["冷链", "温控", "GPS"],
                  "is_mandatory": true或false
                }}
              ]
            }}
          ],

          "commercial_requirements": [
            {{"content": "商务要求描述"}}
          ],

          "quotation_format": {{
            "discount_rate_required": true/false,
            "categories": ["蔬菜", "肉类"],
            "pricing_method": "固定单价/下浮率/综合评标价"
          }}
        }}

        注意：
        1. 废标项是最关键的信息，必须逐条提取，不能遗漏
        2. 评分标准必须拆解到子项级别，每个子项附带关键词列表
        3. keywords 字段用于后续自动化覆盖率检查，请提取 2-5 个核心关键词
        4. is_mandatory 标注该子项是否为必须响应项（废标级评分项标记为 true）
        5. 如果招标文件中未明确某项，值填写 null
        6. severity 只有 "fatal"（废标）和 "warning"（扣分）两种

  # ===== 合规性审查 =====
  compliance_review:
    v1_five_dimension:
      version: "1.0"
      description: "5维合规审查 — 废标/资格/评分覆盖/报价/食安"
      template: |
        你是食材配送投标领域的合规审查专家。请严格审核以下投标文件内容，
        逐条检查以下 5 个维度的合规性：

        == 招标方资格要求 ==
        {qualification_requirements}

        == 废标条件 ==
        {disqualification_items}

        == 评分标准 ==
        {scoring_criteria}

        == 投标文件技术方案内容 ==
        {bid_content}

        == 企业已有资质清单 ==
        {credentials_list}

        == 报价信息 ==
        {quotation_summary}

        请按以下5个维度逐一审查：

        1.【🔴 废标项扫描】逐条对照废标条件，检查是否全部满足
        2.【🔴 资格证件完整性】比对必需证照 vs 企业已有证照，列出缺口
        3.【🟡 评分覆盖率】每个评分项在技术方案中是否有对应内容
        4.【🟡 报价格式合规】报价格式/小数位/货币/汇总是否符合要求
        5.【🟠 食品安全要素】留样/追溯/农残/健康证/HACCP 是否覆盖

        == 输出格式 ==
        COMPLIANCE_SCORE: X/100
        FATAL_ISSUES: N（致命问题数，任一存在即判定不合格）
        WARNING_ISSUES: N（警告问题数）
        
        DIMENSION_1_DISQUALIFICATION:
        - [条目]: 状态(✅通过/❌不满足) → 修正建议
        
        DIMENSION_2_CREDENTIALS:
        - [证照名称]: ✅已有(有效期至YYYY-MM-DD) / ❌缺失 → 办理建议
        
        DIMENSION_3_SCORING:
        - [评分项](XX分): 覆盖率XX% → 补充建议
        
        DIMENSION_4_QUOTATION:
        - [检查项]: ✅合规 / ❌不合规 → 修正建议
        
        DIMENSION_5_FOOD_SAFETY:
        - [安全要素]: ✅已覆盖 / ❌缺失 → 必须补充内容

  # ===== 报价策略分析 =====
  pricing_strategy:
    v1_analysis:
      version: "1.0"
      description: "报价策略分析 — 基于客户类型和预算给出下浮率建议"
      template: |
        请基于以下信息，给出食材配送投标的报价策略建议：

        采购方类型：{customer_type}
        项目预算：{budget}元
        配送品类：{categories}
        竞争态势：{competition_info}
        历史中标下浮率参考：
        {historical_discount_rates}

        请输出：
        1. 建议下浮率区间及理由
        2. 各品类定价注意事项
        3. 报价风险提示（低于成本/超预算）
        4. 差异化报价策略建议

  # ===== 商机漏斗 — 公告原文解析 =====
  tender_text_parse:
    v1_extract:
      version: "1.0"
      description: "从粘贴的招标公告原文中提取结构化信息"
      template: |
        你是招标公告信息提取专家。请从以下公告原文中提取结构化信息。

        == 公告原文 ==
        {raw_text}

        请严格按以下 JSON 格式输出，未找到的字段填 null：
        {{
          "title": "项目名称",
          "buyer_name": "采购方/招标方名称",
          "buyer_region": "所在地区（如：安徽合肥）",
          "customer_type": "school/hospital/government/enterprise/canteen 之一",
          "tender_type": "open/invite/negotiate/inquiry/single 之一",
          "budget_amount": 数字（元，不含万字），
          "deadline": "YYYY-MM-DD 格式",
          "publish_date": "YYYY-MM-DD 格式",
          "delivery_scope": "配送范围描述",
          "content_summary": "公告核心要求摘要（200字内，包含关键资格要求和评分标准）"
        }}

        注意：
        1. budget_amount 必须转为元（如50万=500000）
        2. 如果原文是 HTML，忽略标签只提取文本内容
        3. 只输出 JSON，不要加任何解释

  # ===== 商机漏斗 — 招标公告匹配分析 =====
  tender_match_analysis:
    v1_capability_match:
      version: "1.0"
      description: "分析招标公告与企业能力的匹配度"
      template: |
        你是生鲜食材配送行业的投标顾问。请分析以下招标公告与投标企业的匹配程度。

        == 招标公告信息 ==
        标题：{notice_title}
        采购方：{buyer_name}
        客户类型：{customer_type}
        预算金额：{budget_amount}元
        投标截止：{deadline}
        配送范围：{delivery_scope}
        公告摘要：{content_summary}

        == 投标企业能力画像 ==
        {capability_graph}

        请严格按以下 JSON 格式输出分析结果：
        {{
          "match_score": 0-100的整数,
          "match_level": "high/medium/low/risky",
          "summary": "一句话匹配结论",
          "strengths": [
            {{"item": "优势项描述", "detail": "具体说明"}}
          ],
          "gaps": [
            {{"item": "缺口项", "severity": "fatal/warning/minor", "detail": "说明", "suggestion": "建议"}}
          ],
          "risk_factors": [
            {{"factor": "风险点", "level": "high/medium/low", "detail": "说明"}}
          ],
          "recommendation": "综合建议（是否值得投标、需要哪些准备）",
          "estimated_win_probability": "high/medium/low",
          "preparation_checklist": ["准备事项1", "准备事项2"]
        }}

        评分标准：
        - 资质完全满足且有竞争优势: 80-100分
        - 资质基本满足但有小缺口: 60-79分
        - 有明显资质缺口但可补: 40-59分
        - 有致命缺口（如缺少必需许可证）: 0-39分，match_level 必须为 "risky"

        注意：
        1. severity 为 "fatal" 表示不满足该要求将直接废标
        2. 如果企业冷链能力不足以覆盖配送范围，这是致命缺口
        3. 只输出 JSON，不要加任何解释
