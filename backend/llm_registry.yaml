# ═══════════════════════════════════════════════════════
# LLM 模型注册表 — 鲜标智投 · 四级容灾路由
# ═══════════════════════════════════════════════════════
#
# 架构规则：
# 1. 业务代码严禁硬编码模型名，必须通过 task_type 查表
# 2. 格式 "provider/model_name"，provider 决定 API Key + Base URL
# 3. 首选模型失败时，熔断器自动 fallback 到下一个
# 4. 修改此文件即可全局切换模型，无需改代码
#
# Provider 配置说明：
#   openai  → OPENAI_API_KEY + OPENAI_BASE_URL (GPT 系列)
#   claude  → CLAUDE_API_KEY + CLAUDE_BASE_URL (Anthropic Opus/Sonnet)
#   gemini  → GEMINI_API_KEY + GEMINI_BASE_URL (Google)
#   deepseek → DEEPSEEK_API_KEY + DEEPSEEK_BASE_URL (国产合规兜底)
#   qwen    → QWEN_API_KEY + QWEN_BASE_URL (通义千问，国产合规兜底)
#
# 分发平台场景：所有 provider 可共用同一个 key/base_url，
# 在 .env 中只配 OPENAI_API_KEY + OPENAI_BASE_URL 即可，
# 其余 provider 未配时自动 fallback 到 OPENAI_* 配置。
#
# ═══════════════════════════════════════════════════════
# 模型稳定性现状（2026-04-07 实测）
# ═══════════════════════════════════════════════════════
#
# ✅ gpt-5.4           稳定快速（主力）
# ✅ gpt-5-mini        稳定（兜底）
# ⚠️ gpt-5.4-pro       连接不稳定（降级为次选）
# ⚠️ claude-sonnet-4-6  替代 Opus，速度快（已在 fallback 链中使用）
# ✅ claude-sonnet-4-6 Opus 替代品（Anthropic 系，速度快）
# ❌ gemini-flash-preview  TypeError NoneType（暂停使用，已从所有 fallback 链移除）
#
# 调整策略：gpt-5.4 作为全 task 首选，Sonnet/gpt-5.4-pro 兜底
# ═══════════════════════════════════════════════════════

tasks:

  # ═══════════════════════════════════════
  # T0 安全关键 — 质量优先
  # ═══════════════════════════════════════

  # 投标合规性检查 — 废标项/资质/一致性，错一个就废标
  compliance_check:
    models:
      - "openai/gpt-5.4"
      - "claude/claude-sonnet-4-6"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 2048
    tier: T0
    note: "安全关键 — gpt-5.4 稳定首选，Sonnet/pro 兜底保质量"

  # 招标文件解析 — 结构化提取，废标项不能遗漏
  tender_parse:
    models:
      - "openai/gpt-5.4"
      - "claude/claude-sonnet-4-6"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 4096
    tier: T0
    note: "安全关键 — 解析精度要求极高，废标项遗漏=直接出局"

  # ═══════════════════════════════════════
  # T1 核心生成 — 商务文档质量
  # ═══════════════════════════════════════

  # 投标章节生成 — 商务文档质量要求最高
  bid_section_generate:
    models:
      - "openai/gpt-5.4"
      - "claude/claude-sonnet-4-6"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.3
    max_tokens: 8192
    tier: T1
    note: "核心生成 — GPT-5.4 稳定首选，Sonnet 兜底"

  # AI 路由引擎 — Tool Calling 意图识别
  tool_calling:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 1024
    tier: T1
    note: "核心路由 — 工具调用仅走 OpenAI 系（其他 provider 兼容性差）"

  # 报价提取 — 数字精度要求高
  quotation_extract:
    models:
      - "openai/gpt-5.4"
      - "claude/claude-sonnet-4-6"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 2048
    tier: T1

  # 报价分析 — 价格策略计算
  pricing_analysis:
    models:
      - "openai/gpt-5.4"
      - "claude/claude-sonnet-4-6"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.2
    max_tokens: 1024
    tier: T1

  # ═══════════════════════════════════════
  # T2 通用业务 — 均衡
  # ═══════════════════════════════════════

  # AI 对话 — 投标智能助手通用会话
  chat:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.5
    max_tokens: 2048
    tier: T2
    note: "通用对话 — gpt-5.4 响应快且稳定"

  # 工具结果解读
  tool_result_interpret:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.3
    max_tokens: 2048
    tier: T2

  # 招标匹配分析 — 企业能力 vs 招标需求
  tender_match_analysis:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.2
    max_tokens: 2048
    tier: T2

  # 招标公告文本提取
  tender_text_parse:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5.4-pro"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 2048
    tier: T2

  # ═══════════════════════════════════════
  # T3 轻量提取 — 性价比
  # ═══════════════════════════════════════

  # 法规检索增强
  regulation_retrieval:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 1024
    tier: T3
    note: "轻量检索 — 不需要强推理"

  # 模板匹配
  template_matching:
    models:
      - "openai/gpt-5.4"
      - "openai/gpt-5-mini"
    temperature: 0.1
    max_tokens: 2048
    tier: T3

  # ═══════════════════════════════════════
  # Embedding — 独立通道
  # ═══════════════════════════════════════

  embedding:
    models:
      - "gemini/gemini-embedding-001"
      - "qwen/text-embedding-v3"
    tier: embedding
    note: "向量化独立通道，不走 LLM 熔断逻辑"
