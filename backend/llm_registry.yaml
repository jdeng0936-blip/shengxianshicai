# ═══════════════════════════════════════════════════════
# LLM 模型注册表 — 鲜标智投 · 多 Provider 路由
# ═══════════════════════════════════════════════════════
#
# 规则：
# 1. 业务代码严禁硬编码模型名，必须通过 task_type 查表
# 2. 每个 task_type 的 models 列表中，格式为 "provider/model_name"
# 3. provider 决定使用哪组 API Key + Base URL（见 config.py）
# 4. 首选模型失败时，自动 fallback 到下一个
# 5. 修改此文件即可全局切换模型，无需改代码

# --- Provider 配置说明 ---
#
#   openai:    → OPENAI_API_KEY + OPENAI_BASE_URL (GPT 系列)
#   gemini:    → GEMINI_API_KEY + GEMINI_BASE_URL (Google)
#   deepseek:  → DEEPSEEK_API_KEY + DEEPSEEK_BASE_URL (国产合规)
#   qwen:      → QWEN_API_KEY + QWEN_BASE_URL (通义千问)
#
# 模型名格式: "provider/model_id"
#   例: "openai/gpt-5.4" → 使用 OPENAI_API_KEY 调 gpt-5.4
#   例: "gemini/gemini-3.1-pro-preview" → 使用 GEMINI_API_KEY 调 gemini-3.1

# --- 任务路由表 ---
tasks:

  # ===== 核心 AI 对话 =====

  # AI 路由引擎 — Tool Calling 意图识别 + 8大投标工具调度
  tool_calling:
    models: ["openai/gpt-5.4", "gemini/gemini-3.1-pro-preview", "deepseek/deepseek-chat"]
    temperature: 0.1
    max_tokens: 1024
    note: "核心路由，要求工具调用准确率最高"

  # AI 对话 — 投标智能助手通用会话
  chat:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4", "deepseek/deepseek-chat"]
    temperature: 0.5
    max_tokens: 2048

  # 工具结果解读
  tool_result_interpret:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4"]
    temperature: 0.3
    max_tokens: 2048

  # ===== 投标文档生成 =====

  # 投标章节生成 — GPT-5.4 主力（商务文档最强）
  bid_section_generate:
    models: ["openai/gpt-5.4", "gemini/gemini-3.1-pro-preview", "deepseek/deepseek-chat"]
    temperature: 0.3
    max_tokens: 8192
    note: "投标文件生成质量要求最高，GPT-5.4 商务文档能力强"

  # 招标文件解析 — 结构化提取
  tender_parse:
    models: ["openai/gpt-5.4", "gemini/gemini-3.1-pro-preview"]
    temperature: 0.1
    max_tokens: 4096
    note: "解析精度要求极高，尤其废标项不能遗漏"

  # 投标合规性检查 — 安全关键
  compliance_check:
    models: ["openai/gpt-5.4", "gemini/gemini-3.1-pro-preview"]
    temperature: 0.1
    max_tokens: 2048
    note: "安全关键任务，需最高推理精度"

  # ===== 知识库与检索 =====

  regulation_retrieval:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4"]
    temperature: 0.1
    max_tokens: 1024

  template_matching:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4"]
    temperature: 0.1
    max_tokens: 2048

  # ===== 报价引擎辅助 =====

  pricing_analysis:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4"]
    temperature: 0.2
    max_tokens: 1024

  quotation_extract:
    models: ["openai/gpt-5.4", "gemini/gemini-3.1-pro-preview"]
    temperature: 0.1
    max_tokens: 2048

  # ===== 商机漏斗 =====

  tender_text_parse:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4"]
    temperature: 0.1
    max_tokens: 2048
    note: "从公告原文提取结构化信息，精度要求高"

  tender_match_analysis:
    models: ["gemini/gemini-3.1-pro-preview", "openai/gpt-5.4", "deepseek/deepseek-chat"]
    temperature: 0.2
    max_tokens: 2048
    note: "招标公告与企业能力匹配分析，需结构化JSON输出"

  # ===== Embedding =====

  embedding:
    models: ["gemini/gemini-embedding-001", "qwen/text-embedding-v3"]
